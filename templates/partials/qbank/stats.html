<div class="qb-stats">
  <div class="qb-stat">
    <div class="stat-num">{{ total }}</div>
    <div class="stat-label">词库总词条</div>
  </div>
  <div class="qb-stat active">
    <div class="stat-num primary">{{ active }}</div>
    <div class="stat-label">在题库中</div>
  </div>
  <div class="qb-stat">
    <div class="stat-num muted">{{ inactive }}</div>
    <div class="stat-label">未入库</div>
  </div>
</div>
